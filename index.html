<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ISKCON Daily Artis - Srimad Bhagavatam and Bhagavad Gita inspired daily prayers and translations.">
  <title>ISKCON Daily Arti Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="https://iskcon.org/favicon.ico">
</head>
<body>
  <div class="overlay">
    <div style="position: absolute; top: 1rem; right: 1rem;">
      <button id="lang-toggle" class="btn btn-outline" style="padding: 0.4rem 1rem;">English</button>
    </div>

    <header>
      <h1>Hare Krishna</h1>
      <p class="subtitle" data-lang-key="subtitle">ISKCON Daily Arti Manager</p>
      <div class="current-time">
        <span id="current-time-text">Checking time...</span>
      </div>
    </header>

    <main id="main-content" class="main-content">
      <!-- Content loaded dynamically via app.js -->
      <div style="text-align: center; padding: 5rem;">
        <div class="subtitle" style="animation: pulse 2s infinite;">Connecting to Eternal Time...</div>
      </div>
    </main>

    <footer style="margin-top: 5rem; text-align: center; padding: 2rem; color: rgba(255,255,255,0.4); font-size: 0.9rem; font-weight: 300;">
      <p>Srila Prabhupada's ISKCON &copy; 2026. All Glories to Sri Guru and Gauranga.</p>
    </footer>
  </div>

  <style>
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
